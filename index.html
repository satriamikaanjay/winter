<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center font-sans text-zinc-200 selection:bg-rose-500/30">

    <div class="bg-zinc-800/50 p-8 rounded-2xl shadow-2xl backdrop-blur-sm border border-zinc-700/50 max-w-sm w-full mx-4 text-center">
        
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 bg-rose-900/30 rounded-full flex items-center justify-center text-rose-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
        </div>

        <div id="step1">
            <h1 class="text-2xl font-semibold mb-2 text-zinc-100">Siapa kamu?</h1>
            <p class="text-sm text-zinc-400 mb-8">Pilih profilmu untuk melanjutkan cerita.</p>
            
            <div class="flex flex-col gap-4">
                <button onclick="selectUser('Satria')" class="bg-blue-600/20 hover:bg-blue-600 border border-blue-500/50 hover:border-blue-500 text-zinc-100 font-medium py-3 rounded-xl transition-all duration-300 flex items-center justify-center gap-2">
                    <span>👦🏻</span> Satria
                </button>
                <button onclick="selectUser('Winda')" class="bg-rose-600/20 hover:bg-rose-600 border border-rose-500/50 hover:border-rose-500 text-zinc-100 font-medium py-3 rounded-xl transition-all duration-300 flex items-center justify-center gap-2">
                    <span>👧🏻</span> Winda
                </button>
            </div>
        </div>

        <div id="step2" class="hidden">
            <h1 class="text-2xl font-semibold mb-2 text-zinc-100">Halo, <span id="userNameDisplay" class="text-rose-400"></span>!</h1>
            <p class="text-sm text-zinc-400 mb-8">Masukkan tanggal awal cerita kita dimulai.</p>

            <form id="pinForm" class="space-y-6">
                <div class="flex justify-center gap-2 sm:gap-3">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                    <input type="number" maxlength="1" class="pin-input w-10 h-12 sm:w-12 sm:h-14 bg-zinc-900 border border-zinc-700 rounded-lg text-center text-xl font-medium text-zinc-100 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all">
                </div>

                <button type="button" onclick="checkPin()" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-medium py-3 rounded-lg transition-colors duration-200">
                    Buka Kenangan
                </button>
                <button type="button" onclick="backToStep1()" class="text-sm text-zinc-500 hover:text-zinc-300 mt-2">Ganti Profil</button>
            </form>

            <p id="errorMessage" class="text-rose-400 text-sm mt-4 hidden">Tanggal yang kamu masukkan salah, coba lagi ya.</p>
        </div>
    </div>

    <script>
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const inputs = document.querySelectorAll('.pin-input');
        const errorMessage = document.getElementById('errorMessage');
        
        const correctPIN = "120526"; 
        let selectedUser = "";

        function selectUser(user) {
            selectedUser = user;
            userNameDisplay.innerText = user;
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            inputs[0].focus();
        }

        function backToStep1() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            inputs.forEach(input => input.value = "");
            selectedUser = "";
        }

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                if (e.target.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) inputs[index - 1].focus();
            });
        });

        function checkPin() {
            let enteredPin = "";
            inputs.forEach(input => enteredPin += input.value);

            if (enteredPin === correctPIN) {
                // Simpan profil yang login ke localStorage
                localStorage.setItem('loggedInUser', selectedUser);
                window.location.href = "home.html"; 
            } else {
                errorMessage.classList.remove('hidden');
                inputs.forEach(input => input.value = "");
                inputs[0].focus();
            }
        }
    </script>
</body>
</html>
